name: kop tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install -ntp -B -DskipTests

      - name: Upload benchmark jar
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-jar
          path: target/benchmarks.jar

  benchmark:
    name: ${{ matrix.benchmark }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        benchmark:
          - CacheReadBenchmark
          - ReflectionBenchmark
          - TopicNameBenchmark
          - RecyclerBenchmark
          - RecyclerNotRecycledBenchmark
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Download benchmark jar
        uses: actions/download-artifact@v4
        with:
          name: benchmarks-jar
          path: target/

      - name: Run ${{ matrix.benchmark }}
        run: java -jar target/benchmarks.jar ${{ matrix.benchmark }}
